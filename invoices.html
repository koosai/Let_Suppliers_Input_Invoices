<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Invoices</title>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #1f2937;
      background-color: #f3f4f6;
    }

    body {
      margin: 0;
      background: #f3f4f6;
    }

    /* Page content is wrapped so it can sit inside a shared admin layout shell. */
    .admin-page {
      padding: 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      padding: 20px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar-left {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    input[type="search"] {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 12px;
      min-width: 260px;
      outline: none;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }

    .btn-outline {
      background: #fff;
      color: #1f2937;
      border: 1px solid #d1d5db;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    th,
    td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      color: #374151;
      background: #f9fafb;
      font-weight: 600;
    }

    .status-row {
      padding: 18px 8px;
      color: #6b7280;
      font-size: 14px;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
      font-size: 14px;
    }

    .error {
      color: #b91c1c;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Keep this content inside shared admin layout container in your app shell. -->
  <main class="admin-page" data-admin-layout="shared">
    <section class="card">
      <div class="toolbar">
        <div class="toolbar-left">
          <input
            id="searchInput"
            type="search"
            placeholder="Search invoices..."
            aria-label="Search invoices"
          />
          <button id="searchButton" class="btn-outline" type="button">Search</button>
        </div>

        <button id="exportButton" class="btn-primary" type="button">
          Export to Excel
        </button>
      </div>

      <div class="table-wrap">
        <table aria-label="Invoices table">
          <thead>
            <tr>
              <th>created_at</th>
              <th>employee_name</th>
              <th>employee_email</th>
              <th>invoice_no</th>
              <th>saved_filename</th>
              <th>client_ip</th>
            </tr>
          </thead>
          <tbody id="invoiceRows">
            <tr>
              <td colspan="6" class="status-row">Loading invoices...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="errorMessage" class="error" role="alert" aria-live="polite"></div>

      <div class="pagination">
        <button id="prevButton" class="btn-outline" type="button">Previous</button>
        <span id="pageIndicator">Page 1</span>
        <button id="nextButton" class="btn-outline" type="button">Next</button>
      </div>
    </section>
  </main>

  <script src="./invoices.js" defer></script>
</body>
</html>
